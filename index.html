      function setMusicState(isPlaying) {
        musicToggle.classList.toggle("is-playing", isPlaying);
        musicToggle.setAttribute("aria-pressed", String(isPlaying));
        musicToggle.setAttribute(
          "aria-label",
          isPlaying ? "배경 음악 정지" : "배경 음악 재생",
        );
        musicIcon.textContent = isPlaying ? "Ⅱ" : "▶";
        musicLabel.textContent = isPlaying ? "음악 재생 중" : "배경 음악";
      }

      musicToggle.addEventListener("click", async () => {
        if (backgroundMusic.paused) {
          try {
            await backgroundMusic.play();
            setMusicState(true);
          } catch (error) {
            setMusicState(false);
            console.error(error);
          }
          return;
        }

        backgroundMusic.pause();
        setMusicState(false);
      });

      backgroundMusic.addEventListener("ended", () => setMusicState(false));

      function showLottieFallback() {
        completionLottie.innerHTML =
          '<div class="lottie-fallback" aria-hidden="true">🎉</div>';
      }

      function loadCompletionAnimation() {
        if (completionAnimation) {
          completionAnimation.goToAndPlay(0, true);
          return;
        }

        if (!window.lottie) {
          showLottieFallback();
          return;
        }

        completionAnimation = window.lottie.loadAnimation({
          container: completionLottie,
          renderer: "svg",
          loop: false,
          autoplay: true,
          path: "./congrat.json",
        });

        completionAnimation.addEventListener("data_failed", showLottieFallback);
      }

      function openCompletionModal() {
        completionOverlay.hidden = false;
        requestAnimationFrame(() => {
          completionOverlay.classList.add("is-open");
          loadCompletionAnimation();
          completionClose.focus();
        });
      }

      function closeCompletionModal() {
        completionOverlay.classList.remove("is-open");
        window.setTimeout(() => {
          completionOverlay.hidden = true;
        }, 520);
      }

      completionClose.addEventListener("click", closeCompletionModal);

      completionOverlay.addEventListener("click", (event) => {
        if (event.target === completionOverlay) {
          closeCompletionModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !completionOverlay.hidden) {
          closeCompletionModal();
        }
      });

      function renderVerses(bible) {
        const verses =
          Array.isArray(bible.verses) && bible.verses.length > 0
            ? bible.verses
            : [{ verse: "", text: bible.text }];

        return verses
          .map(
            (item) => `
              <div class="verse-row">
                <div class="verse-number">${item.verse ?? ""}</div>
                <div class="verse-text">${item.text ?? ""}</div>
              </div>
            `,
          )
          .join("");
      }

      function renderList(items) {
        if (!Array.isArray(items) || items.length === 0) {
          return "";
        }

        return `
          <ul>
            ${items.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        `;
      }

        if (!recommendedProduct) {
          return "";

        return `

              <h2 id="productSectionTitle" class="product-title">🎁 오늘의 추천 상품</h2>

                  loading="lazy"
                />
                <span class="product-copy">

                  <span class="product-summary">${recommendedProduct.description}</span>
                  <span class="product-action">상품 보러가기</span>
                </span>
              </a>

            <p class="product-disclosure">
              이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.

          </section>

      function setActiveNav(view) {
        const isArchive = view === "archive";

        todayNav.classList.toggle("is-active", !isArchive);
        archiveNav.classList.toggle("is-active", isArchive);
        todayNav.setAttribute("aria-current", isArchive ? "false" : "page");
        archiveNav.setAttribute("aria-current", isArchive ? "page" : "false");
      }

      function revealContent() {
        const revealItems = document.querySelectorAll(".reveal");

        if (!("IntersectionObserver" in window)) {
          revealItems.forEach((item) => item.classList.add("is-visible"));
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) {
                return;
              }

              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            });
          },
          {
            rootMargin: "0px 0px -12% 0px",
            threshold: 0.12,
          },
        );

        revealItems.forEach((item, index) => {
          item.style.setProperty(
            "--reveal-delay",
            `${Math.min(index, 3) * 90}ms`,
          );
          observer.observe(item);
        });
      }

      async function saveQTImage() {
        const card = document.getElementById("qtCard");
        const saveButton = document.getElementById("saveButton");

        if (!card || !window.html2canvas) {
          alert("이미지 저장 기능을 불러오지 못했습니다.");
          return;
        }

        const previousLabel = saveButton.textContent;
        saveButton.disabled = true;
        saveButton.textContent = "저장 중...";

        try {
          card.classList.add("is-capturing");
          card.querySelectorAll(".reveal").forEach((item) => {
            item.classList.add("is-visible");
          });

          const canvas = await window.html2canvas(card, {
            backgroundColor: "#ffffff",
            scale: Math.min(window.devicePixelRatio || 1, 2),
            useCORS: true,
            ignoreElements: (element) =>
              element.hasAttribute("data-html2canvas-ignore"),
          });

          const imageUrl = canvas.toDataURL("image/jpeg", 0.92);
          const link = document.createElement("a");
          link.href = imageUrl;
          link.download = `elim-qt-${currentQTDate || new Date().toISOString().slice(0, 10)}.jpg`;
          link.click();
        } catch (error) {
          console.error(error);
          alert("이미지를 저장하지 못했습니다.");
        } finally {
          card.classList.remove("is-capturing");
          saveButton.disabled = false;
          saveButton.textContent = previousLabel;
        }
      }

      async function shareQT() {
        const shareButton = document.getElementById("shareButton");
        const title = "엘림큐티 - 말씀 묵상";
        const text = currentQTDate
          ? `${currentQTDate} 말씀 묵상을 함께 나눠요.`
          : "오늘의 말씀 묵상을 함께 나눠요.";
        const url = window.location.href;

        if (!shareButton) {
          return;
        }

        const previousLabel = shareButton.textContent;

        try {
          if (navigator.share) {
            await navigator.share({ title, text, url });
            return;
          }

          await navigator.clipboard.writeText(url);
          shareButton.textContent = "링크 복사됨";
          window.setTimeout(() => {
            shareButton.textContent = previousLabel;
          }, 1600);
        } catch (error) {
          if (error.name === "AbortError") {
            return;
          }

          console.error(error);
          alert("공유하지 못했습니다.");
        }
      }

      function renderQT(qt, options = {}) {
        const bibleReference = qt.bible?.reference || qt.verseAddress || "";
        const showCompleteButton = options.showCompleteButton !== false;
        currentQTDate = qt.date || "";

        content.innerHTML = `
      <div id="qtCard" class="card reveal">

        ${qt.date ? `<div class="date reveal">${qt.date}</div>` : ""}

        <div class="title reveal">
          ${qt.title}
        </div>

        <div class="verse-reference reveal">
          ${bibleReference}
        </div>

        <hr class="content-divider reveal" />

        <div class="verse reveal">
          ${renderVerses(qt.bible)}
        </div>

        <hr class="content-divider reveal" />

        <div class="section reveal">
          <div class="section-title">💭 묵상하기</div>
          <div class="text-block">${qt.meditation}</div>
        </div>

        <div class="section reveal">
          <div class="section-title">📝 적용하기</div>
          ${Array.isArray(qt.application) ? renderList(qt.application) : `<div>${qt.application}</div>`}
        </div>

        <div class="section reveal">
          <div class="section-title">🙏 기도 포인트</div>
          ${renderList(qt.prays)}
        </div>

        <div class="section reveal">
          <div class="section-title">🙏 기도하기</div>
          <div class="text-block">${qt.prayer}</div>
        </div>

        <div class="complete-action reveal" data-html2canvas-ignore="true">
          ${
            showCompleteButton
              ? `<button id="completeButton" class="complete-button" type="button">
            완료하기
          </button>`
              : ""
          }
          <button id="saveButton" class="save-button" type="button">
            보관하기
          </button>
          <button id="shareButton" class="share-button" type="button">
            공유하기
          </button>
        </div>

      </div>

      ${renderProductRecommendations()}
    `;

        const completeButton = document.getElementById("completeButton");

        if (completeButton) {
          completeButton.addEventListener("click", openCompletionModal);
        }

        document
          .getElementById("saveButton")
          .addEventListener("click", saveQTImage);
        document
          .getElementById("shareButton")
          .addEventListener("click", shareQT);
        revealContent();
      }

      async function loadQT(source = "./qt.json", options = {}) {
        try {
          content.className = "loading";
          content.textContent = "불러오는 중...";

          const response = await fetch(
            `${source}${source.includes("?") ? "&" : "?"}${Date.now()}`,
          );

          if (!response.ok) {
            throw new Error(`QT fetch failed: ${response.status}`);
          }

          const qt = await response.json();
          content.className = "";
          renderQT(qt, options);
        } catch (error) {
          content.className = "";
          content.innerHTML = `
      <div class="card">
        QT를 불러오지 못했습니다.
      </div>
    `;

          console.error(error);
        }
      }

      async function loadArchiveList() {
        setActiveNav("archive");
        currentQTDate = "";
        content.className = "loading";
        content.textContent = "불러오는 중...";

        try {
          const response = await fetch(`./archive/index.json?${Date.now()}`);

          if (!response.ok) {
            throw new Error(`Archive fetch failed: ${response.status}`);
          }

          const archiveItems = await response.json();

          if (!Array.isArray(archiveItems) || archiveItems.length === 0) {
            content.className = "";
            content.innerHTML = `
      <div class="card">
        아직 지난 큐티가 없습니다.
      </div>
    `;
            return;
          }

          const visibleArchiveItems = archiveItems.slice(0, 30);

          content.className = "";
          content.innerHTML = `
      <div class="card reveal">
        <div class="archive-header">
          <h2 class="archive-title">지난 큐티보기</h2>
          <p class="archive-description">날짜를 선택하면 지난 말씀 묵상을 볼 수 있습니다.</p>
        </div>
        <div class="archive-list">
          ${visibleArchiveItems
            .map(
              (item) => `
                <button
                  class="archive-item"
                  type="button"
                  data-file="${item.file}"
                  data-date="${item.date}"
                >
                  <span>
                    <span class="archive-item-title">${item.title}</span>
                    <span class="archive-item-date">${item.date}</span>
                  </span>
                  <span class="archive-item-arrow" aria-hidden="true">›</span>
                </button>
              `,
            )
            .join("")}
        </div>
      </div>
    `;

          document.querySelectorAll(".archive-item").forEach((item) => {
            item.addEventListener("click", () => {
              window.location.hash = `archive/${item.dataset.date}`;
            });
          });

          revealContent();
        } catch (error) {
          content.className = "";
          content.innerHTML = `
      <div class="card">
        지난 큐티 목록을 불러오지 못했습니다.
      </div>
    `;

          console.error(error);
        }
      }

      async function loadArchiveQT(file) {
        if (!file || file.includes("/") || file.includes("..")) {
          await loadArchiveList();
          return;
        }

        setActiveNav("archive");
        await loadQT(`./archive/${file}`, { showCompleteButton: false });
      }

      async function loadArchiveQTByDate(date) {
        try {
          const response = await fetch(`./archive/index.json?${Date.now()}`);

          if (!response.ok) {
            throw new Error(`Archive fetch failed: ${response.status}`);
          }

          const archiveItems = await response.json();
          const item = archiveItems.find((archiveItem) => archiveItem.date === date);

          if (!item) {
            await loadArchiveList();
            return;
          }

          await loadArchiveQT(item.file);
        } catch (error) {
          console.error(error);
          await loadArchiveList();
        }
      }

      function loadTodayQT() {
        setActiveNav("today");
        window.history.replaceState(null, "", window.location.pathname);
        loadQT("./qt.json", { showCompleteButton: true });
      }

      function loadRoute() {
        if (window.location.hash === "#archive") {
          loadArchiveList();
          return;
        }

        const archiveMatch = window.location.hash.match(/^#archive\/(.+)$/);

        if (archiveMatch) {
          loadArchiveQTByDate(decodeURIComponent(archiveMatch[1]));
          return;
        }

        loadTodayQT();
      }

      todayNav.addEventListener("click", loadTodayQT);
      archiveNav.addEventListener("click", () => {
        if (window.location.hash === "#archive") {
          loadArchiveList();
          return;
        }

        window.location.hash = "archive";
      });
      window.addEventListener("hashchange", loadRoute);

      loadRoute();
    </script>
